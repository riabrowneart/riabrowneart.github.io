<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Ria Browne Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== HEADER / NAV ===================== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-name">Ria Browne</span>
        <span class="logo-role">Artist</span>
      </a>
      <nav class="nav">
        <a href="work.html" class="nav-active">Work</a>
        <a href="index.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- ===================== GALLERY / WORK ===================== -->
    <section class="section-work">
      <div class="gallery-column">

        <figure class="gallery-item" data-index="0">
          <img src="images/MotherandBaby.jpeg" alt="Mother and Baby" loading="lazy" />
          <figcaption>Mother and Baby</figcaption>
        </figure>

        <figure class="gallery-item" data-index="1">
          <img src="images/SunsetCastlegreen.jpeg" alt="Sunset Castlegreen" loading="lazy" />
          <figcaption>Sunset Castlegreen</figcaption>
        </figure>

        <figure class="gallery-item" data-index="2">
          <img src="images/Headmaster.jpeg" alt="Headmaster" loading="lazy" />
          <figcaption>Headmaster</figcaption>
        </figure>

        <figure class="gallery-item" data-index="3">
          <img src="images/BeachGrass.jpeg" alt="Beach Grass" loading="lazy" />
          <figcaption>Beach Grass</figcaption>
        </figure>

        <figure class="gallery-item" data-index="4">
          <img src="images/Choreography.jpeg" alt="Choreography" loading="lazy" />
          <figcaption>Choreography</figcaption>
        </figure>

        <figure class="gallery-item" data-index="5">
          <img src="images/BeachDay.jpeg" alt="Beach Day" loading="lazy" />
          <figcaption>Beach Day</figcaption>
        </figure>

        <figure class="gallery-item" data-index="6">
          <img src="images/GoaBeach.jpeg" alt="Goa Beach" loading="lazy" />
          <figcaption>Goa Beach</figcaption>
        </figure>

        <figure class="gallery-item" data-index="7">
          <img src="images/Journey.jpeg" alt="Journey" loading="lazy" />
          <figcaption>Journey</figcaption>
        </figure>

      </div>
    </section>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <p>&copy; 2026 Ria Browne Art</p>
  </footer>

  <!-- ===================== LIGHTBOX ===================== -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" aria-label="Previous">&#8592;</button>
    <button class="lightbox-next" aria-label="Next">&#8594;</button>
    <div class="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="" />
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
