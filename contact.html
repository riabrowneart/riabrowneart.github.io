<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Ria Browne Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== HEADER / NAV ===================== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-name">Ria Browne</span>
        <span class="logo-role">Artist</span>
      </a>
      <nav class="nav">
        <a href="work.html">Work</a>
        <a href="index.html">About</a>
        <a href="contact.html" class="nav-active">Contact</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- ===================== CONTACT ===================== -->
    <section class="section-contact">
      <div class="contact-inner">
        <h2 class="contact-headline">Get in touch</h2>
        <form action="https://formspree.io/f/xnjowape" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <button type="submit" class="btn-send">Send</button>
        </form>
      </div>
    </section>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <p>&copy; 2026 Ria Browne Art</p>
  </footer>

</body>
</html>
